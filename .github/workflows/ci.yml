name: CI

on:
  push:
    branches:
      - homolog
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  integrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Automated tests
        run: npm test

      - name: Code quality
        run: npm run quality

      - name: Docker build
        run: docker build -t task2-fabri-ci .

  open-pull-request:
    needs: integrate
    if: github.ref == 'refs/heads/homolog'
    runs-on: ubuntu-latest

    steps:
      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          AHEAD_BY="$(gh api "repos/$GH_REPO/compare/main...homolog" --jq .ahead_by)"

          if [ "$AHEAD_BY" -eq 0 ]; then
            echo "A branch homolog nao possui mudancas novas para a main."
            exit 0
          fi

          PR_NUMBER="$(gh pr list --head homolog --base main --state open --json number --jq '.[0].number')"

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base main \
              --head homolog \
              --title "Promove homologacao para producao" \
              --body "CI aprovado. Aguardando validacao manual em Homologacao antes do merge para main."
          else
            echo "A branch homolog ja possui o Pull Request #$PR_NUMBER aberto."
          fi
