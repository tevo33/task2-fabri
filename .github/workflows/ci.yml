name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  integrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Automated tests
        run: npm test

      - name: Code quality
        run: npm run quality

      - name: Docker build
        run: docker build -t task2-fabri-ci .

  open-pull-request:
    needs: integrate
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          OPEN_PR_COUNT="$(gh pr list --head "$BRANCH" --state open --json number --jq length)"

          if [ "$OPEN_PR_COUNT" -eq 0 ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Atualiza $BRANCH" \
              --body "Pull Request criado automaticamente apos aprovacao do CI."
          else
            echo "A branch $BRANCH ja possui um Pull Request aberto."
          fi
