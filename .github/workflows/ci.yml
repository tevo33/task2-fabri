name: CI

on:
  push:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  integrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Automated tests
        run: npm test

      - name: Code quality
        run: npm run quality

      - name: Docker build
        run: docker build -t task2-fabri-ci .

  merge-pull-request:
    needs: integrate
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Open and merge pull request
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          PR_NUMBER="$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')"

          if [ -z "$PR_NUMBER" ]; then
            PR_URL="$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Atualiza $BRANCH" \
              --body "Pull Request criado automaticamente apos aprovacao do CI.")"
            PR_NUMBER="${PR_URL##*/}"
          fi

          for attempt in $(seq 1 12); do
            MERGEABLE="$(gh pr view "$PR_NUMBER" --json mergeable --jq .mergeable)"

            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              gh pr merge "$PR_NUMBER" --merge --delete-branch
              exit 0
            fi

            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "Pull Request possui conflitos e nao sera mesclado."
              exit 1
            fi

            sleep 5
          done

          echo "GitHub nao confirmou a possibilidade de merge no tempo esperado."
          exit 1
